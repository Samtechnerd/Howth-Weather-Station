<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive Windy.com rain and wind map centred on Howth, Co. Dublin.">
    <title>H.W.S — Windy.com Map</title>
    <link rel="icon" href="howthw.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#14161a">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HWS">
    <meta name="color-scheme" content="light dark">
    <script>
        (function () {
            try {
                var pref = localStorage.getItem('themePreference') || localStorage.getItem('theme') || 'system';
                var resolved = (pref === 'light' || pref === 'dark')
                    ? pref
                    : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', resolved);
                var accent = localStorage.getItem('accentColor');
                if (accent) document.documentElement.setAttribute('data-accent', accent);

                // iOS-only "Liquid Glass" segmented control lens. Detected here,
                // synchronously, so the class is present before first paint —
                // no flash of the wrong control style.
                var ua = navigator.userAgent || '';
                var isIOS = /iPad|iPhone|iPod/.test(ua)
                    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                if (isIOS) document.documentElement.classList.add('is-ios');
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="weather-app">
        <aside id="sidebar">
            <div id="station-header">
                <div class="logo-container">
                    <img src="howthw.png" alt="Howth Weather Station logo">
                </div>
                <h1>Howth Weather Station</h1>
                <span class="station-subtitle">Howth, Co. Dublin</span>
            </div>
            <nav aria-label="Primary">
                <ul>
                    <li class="nav-item">
                        <a href="index.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 2l9 7.5"/><path d="M5 8.5V21a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V8.5"/></svg></span>
                            <span class="nav-label">Home</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="forecast.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
                            <span class="nav-label">Forecast</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="widgets.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg></span>
                            <span class="nav-label">Widgets</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="alerts.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 1 21h22L12 2z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
                            <span class="nav-label">Alerts</span>
                        </a>
                    </li>
                    <li class="nav-item active-page">
                        <a href="windy.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6l7-4 8 4 7-4v16l-7 4-8-4-7 4V6z"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></span>
                            <span class="nav-label">Windy.com</span>
                        </a>
                    </li>
                    <li class="nav-item settings-trigger-item">
                        <button type="button" class="nav-settings-btn" id="settings-trigger" aria-label="Settings" aria-haspopup="dialog">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
                            <span class="nav-label">Settings</span>
                        </button>
                    </li>
                </ul>
            </nav>
            <div id="info-section">
                <a href="https://github.com/samtechnerd/howth-weather-station" target="_blank" rel="noopener">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>
                    <span>About</span>
                </a>
            </div>
            <div id="dark-mode-toggle">
                <label for="theme-switch">Light mode</label>
                <label class="switch-container">
                    <input type="checkbox" id="theme-switch" aria-label="Toggle light and dark mode">
                    <span class="slider"></span>
                </label>
            </div>
        </aside>

        <main id="dashboard-content" class="windy-content">
            <div id="windy-map-container">
                <iframe
                    id="windy-map"
                    src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=%C2%B0C&metricWind=km/h&zoom=7&overlay=rain&product=ecmwf&level=surface&lat=53.38&lon=-6.06"
                    title="Windy.com wind and rain map"
                    frameborder="0"
                    allowfullscreen
                ></iframe>
            </div>
        </main>
    </div>

    <!-- Mobile settings sheet -->
    <div class="settings-overlay" id="settings-overlay" hidden>
        <div class="settings-sheet" role="dialog" aria-modal="true" aria-label="Settings">
            <div class="settings-sheet-handle"></div>
            <h3>Settings</h3>
            <div class="settings-section">
                <span class="settings-label">Appearance</span>
                <div class="segmented-control" id="theme-segmented">
                    <div class="segmented-glass" id="segmented-glass"></div>
                    <button type="button" data-theme-option="system">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none"/></svg>
                        Auto
                    </button>
                    <button type="button" data-theme-option="light">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
                        Light
                    </button>
                    <button type="button" data-theme-option="dark">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        Dark
                    </button>
                </div>
            </div>
            <div class="settings-section">
                <span class="settings-label">Accent Color</span>
                <div class="accent-swatches" id="accent-swatches">
                    <button type="button" class="accent-swatch" data-accent="blue" style="--swatch-color:#4a90e2" aria-label="Blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
                    <button type="button" class="accent-swatch" data-accent="red" style="--swatch-color:#ef4444" aria-label="Red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
                    <button type="button" class="accent-swatch" data-accent="orange" style="--swatch-color:#f97316" aria-label="Orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
                    <button type="button" class="accent-swatch" data-accent="green" style="--swatch-color:#22c55e" aria-label="Green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
                    <button type="button" class="accent-swatch" data-accent="purple" style="--swatch-color:#a855f7" aria-label="Purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
                    <button type="button" class="accent-swatch" data-accent="pink" style="--swatch-color:#ec4899" aria-label="Pink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
                </div>
            </div>
            <a href="https://github.com/samtechnerd/howth-weather-station" target="_blank" rel="noopener" class="settings-about-link">About this app &rarr;</a>
            <button type="button" class="settings-close" id="settings-close">Close</button>
        </div>
    </div>

    <script src="theme.js" defer></script>
    <script src="settings.js" defer></script>
    <script src="pwa.js" defer></script>
</body>
</html>
