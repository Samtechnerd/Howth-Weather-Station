<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="7-day weather forecast for Howth, Co. Dublin.">
    <title>H.W.S — Forecast</title>
    <link rel="icon" href="howthw.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#14161a">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HWS">
    <script>
        (function () {
            try { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark'); }
            catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="weather-app">
        <aside id="sidebar">
            <div id="station-header">
                <div class="logo-container">
                    <img src="howthw.png" alt="Howth Weather Station logo">
                </div>
                <h1>Howth Weather Station</h1>
                <span class="station-subtitle">Howth, Co. Dublin</span>
            </div>
            <nav aria-label="Primary">
                <ul>
                    <li class="nav-item">
                        <a href="index.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 2l9 7.5"/><path d="M5 8.5V21a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V8.5"/></svg></span>
                            <span class="nav-label">Home</span>
                        </a>
                    </li>
                    <li class="nav-item active-page">
                        <a href="forecast.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
                            <span class="nav-label">Forecast</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="widgets.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg></span>
                            <span class="nav-label">Widgets</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="alerts.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 1 21h22L12 2z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
                            <span class="nav-label">Weather alerts</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="windy.html">
                            <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6l7-4 8 4 7-4v16l-7 4-8-4-7 4V6z"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></span>
                            <span class="nav-label">Windy.com</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div id="info-section">
                <a href="https://github.com/samtechnerd/howth-weather-station" target="_blank" rel="noopener">
                    <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>
                    <span>About</span>
                </a>
            </div>
            <div id="dark-mode-toggle">
                <label for="theme-switch">Light mode</label>
                <label class="switch-container">
                    <input type="checkbox" id="theme-switch" aria-label="Toggle light and dark mode">
                    <span class="slider"></span>
                </label>
            </div>
        </aside>

        <main id="dashboard-content">
            <div class="page-header">
                <h2>7-Day Forecast</h2>
                <div class="live-status">
                    <span id="forecast-updated">Loading…</span>
                </div>
            </div>

            <!-- Today hero -->
            <section class="gauge-card forecast-hero" id="forecast-hero">
                <div class="forecast-hero-icon" id="forecast-hero-icon"></div>
                <div class="forecast-hero-main">
                    <span class="tile-label">Today</span>
                    <div class="forecast-hero-temp"><span id="forecast-hero-temp">--</span>°C</div>
                    <span class="forecast-hero-desc" id="forecast-hero-desc">--</span>
                    <span class="forecast-hero-range">H:<strong id="forecast-hero-high">--</strong>° L:<strong id="forecast-hero-low">--</strong>°</span>
                </div>
                <div class="forecast-hero-stats">
                    <div class="forecast-hero-stat">
                        <span class="stat-label">Rain chance</span>
                        <span class="stat-value" id="forecast-hero-rain">--</span>
                    </div>
                    <div class="forecast-hero-stat">
                        <span class="stat-label">Wind</span>
                        <span class="stat-value" id="forecast-hero-wind">--</span>
                    </div>
                    <div class="forecast-hero-stat">
                        <span class="stat-label">UV Index</span>
                        <span class="stat-value" id="forecast-hero-uv">--</span>
                    </div>
                </div>
            </section>

            <!-- 7-day outlook -->
            <section class="forecast-days" id="forecast-days">
                <p class="alert-loading">Loading forecast…</p>
            </section>

            <!-- Hourly trend -->
            <section class="trends-section">
                <div class="trends-header">
                    <h3>Next 48 Hours</h3>
                </div>
                <div class="gauge-card chart-card">
                    <h4>Temperature &amp; rain chance</h4>
                    <div class="chart-canvas-wrap"><canvas id="hourly-trend-chart"></canvas></div>
                </div>
            </section>
        </main>
    </div>

    <script src="theme.js" defer></script>
    <script src="pwa.js" defer></script>
    <script src="vendor/chart.umd.min.js" defer></script>
    <script src="forecast.js" defer></script>
</body>
</html>
